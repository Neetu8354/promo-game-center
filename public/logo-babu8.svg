<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" role="img" aria-label="Babu8 logo">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Icon badge: shield/hexagon with stylized cricket ball 8 -->
  <g transform="translate(2, 2)">
    <path d="M20 2 L36 10 L36 30 L20 38 L4 30 L4 10 Z" fill="url(#bgGrad)" stroke="#FBBF24" stroke-width="2" stroke-linejoin="round"/>
    <!-- cricket seam lines -->
    <path d="M12 8 C18 16, 18 24, 12 32" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M28 8 C22 16, 22 24, 28 32" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- stylized 8 -->
    <text x="20" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="url(#accentGrad)" style="font-style: italic">8</text>
  </g>

  <!-- Wordmark: Babu8 -->
  <text x="46" y="35" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" fill="#111827" style="font-style: italic; letter-spacing: -1px">Babu</text>
  <text x="129" y="35" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" fill="url(#accentGrad)" style="font-style: italic; letter-spacing: -1px">8</text>
</svg>
